{% if include.html %}
  {% assign headings = include.html | split: '<h2' %}

  <ul class="toc">
    {% for h in headings offset: 1 %}
      {% if h contains '</h2>' %}
        {% assign text = h | split: '>' | last | split: '</h2>' | first %}

        <li>{{ text }}</li>
      {% endif %}
    {% endfor %}
  </ul>
{% endif %}
